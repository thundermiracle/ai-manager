name: macOS DMG Packaging

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package-macos-dmg:
    runs-on: macos-14
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build DMG package
        run: pnpm run package:macos:dmg

      - name: Verify packaging outputs
        run: |
          ls -la src-tauri/target/release/bundle/dmg
          test -f dist/macos/dmg-manifest.json

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-manager-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload packaging manifest
        uses: actions/upload-artifact@v4
        with:
          name: ai-manager-macos-dmg-manifest
          path: dist/macos/dmg-manifest.json
          if-no-files-found: error

      - name: Attach DMG and manifest to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            dist/macos/dmg-manifest.json
