name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release token
        run: |
          if [ -z "${{ secrets.RELEASE_PLEASE_TOKEN }}" ]; then
            echo "::error::Missing RELEASE_PLEASE_TOKEN secret. Configure a PAT or GitHub App token so release-please PRs can trigger pull_request CI."
            exit 1
          fi

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
